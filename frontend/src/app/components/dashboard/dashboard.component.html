<div *ngIf="user$ | async as user; else loading">
  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top py-2">
    <div class="container-fluid px-lg-5">
      <a class="navbar-brand d-flex align-items-center fw-bold fs-3" (click)="goToHome()" style="color: #709085;">
        <img src="http://192.168.1.7:8080/images/logo.png" style="width: 50px;">
        <span>Amazed</span>
      </a>

      <a *ngIf="userService.isAdmin(user)" (click)="goToLibDashBoard()">
        Librarians Management
      </a>

      <!-- <a *ngIf="userService.isLibrarian(user)" (click)="goToBookDashBoard()">
        Books Management
      </a> -->

      <div *ngIf="userService.isLibrarian(user)" class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center py-0" id="userDropdown" role="button"
              data-bs-toggle="dropdown" aria-expanded="false">
              Books Management
            </a>

            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-3">
              <li>
                <a class="dropdown-item py-2" (click) = "goToBookDashBoard()">
                  Inventory
                </a>
              </li>
              <li>
                <a class="dropdown-item py-2"  (click) = "goToGoogleBooks()">
                  Google Books
                </a>
              </li>
              <!-- <li>
                <a class="dropdown-item py-2"  (click) = "goToBook()">
                  New Book
                </a>
              </li> -->
            </ul>
          </li>
        </ul>
      </div>


      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center py-0" id="userDropdown" role="button"
              data-bs-toggle="dropdown" aria-expanded="false">
              <div class="avatar-wrapper me-2">
                <img [src]="user.profile_picture_url || 'http://192.168.1.7:8080/images/default.jpg'" alt="avatar"
                  class="rounded-circle border border-2 shadow-sm"
                  style="width: 42px; height: 42px; object-fit: cover; border-color: #709085 !important;">
              </div>
              <div class="d-none d-lg-block text-start">
                <p class="mb-0 small fw-bold text-dark">{{user.first_name}} {{user.last_name}}</p>
                <p class="mb-0 x-small text-muted" style="font-size: 0.75rem;">Account Settings</p>
              </div>
            </a>

            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-3">
              <li>
                <a class="dropdown-item py-2" (click)="goToProfile()">
                  <i class="bi bi-person me-2"></i> Profile
                </a>
              </li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li>
                <a class="dropdown-item py-2 text-danger" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i> Logout
                </a>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    <router-outlet></router-outlet>
  </main>
</div>

<ng-template #loading>
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</ng-template>
