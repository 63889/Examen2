<div class="container mt-4">
    <h3 class="mb-4">Librarians Management</h3>

    <div class="card p-4 shadow-sm mb-5">
        <h5 class="mb-3">New Librarian</h5>
        <form (submit)="addLibrarian()" class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Name</label>
                <input class="form-control" [(ngModel)]="first_name" name="first_name" placeholder="Name" required />
            </div>
            <div class="col-md-3">
                <label class="form-label">Last Name</label>
                <input class="form-control" [(ngModel)]="last_name" name="last_name" placeholder="Last Name" required />
            </div>
            <div class="col-md-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" [(ngModel)]="email" name="email" placeholder="Email"
                    required />
            </div>
            <div class="col-md-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" [(ngModel)]="password" name="password"
                    placeholder="Password" required />
            </div>
            <div class="col-12 mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add Librarian</button>
            </div>
        </form>
    </div>

    <hr class="my-4">

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Avatar</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                @for(user of users; track $index){
                <tr>
                    <td>{{ $index + 1 }}</td>
                    <td>
                        <img [src]="user.profile_picture_url || 'http://192.168.1.7:8080/images/default.jpg'" alt="avatar"
                            class="rounded-circle border border-2 shadow-sm"
                            style="width: 45px; height: 45px; object-fit: cover; border-color: #709085 !important;">
                    </td>
                    <td>@if(user.isEditing) {
                        <input class="form-control form-control-sm" [(ngModel)]="user.editData.first_name" />
                        } @else {
                        {{ user.first_name }}
                        }
                    </td>
                    <td>
                        @if(user.isEditing) {
                        <input class="form-control form-control-sm" [(ngModel)]="user.editData.last_name" />
                        } @else {
                        {{ user.last_name }}
                        }
                    </td>
                    <td>{{ user.email }}</td>
                    <td>
                        @if(!user.isEditing) {
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-sm btn-outline-warning" (click)="enableEdit(user)">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" (click)="deleteLibrarian(user)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                        } @else {
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-sm btn-outline-success" (click)="saveEdit(user)">
                                <i class="bi bi-check-lg"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" (click)="cancelEdit(user)">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                        }
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
