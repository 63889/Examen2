<div *ngIf="transMessage" class="alert" [class]="'alert-' + transMessage.class">{{transMessage.message}}</div>
<div class="container py-5 d-flex justify-content-center">
  <div *ngIf="!isEditing; else editProfile" class="col-lg-4">
    <div class="card p-3">
      <button class="edit-btn shadow-sm" (click)="isEditing = true" title="Edit Profile">
        <i class="bi bi-pencil-square"></i>
      </button>

      <div class="card-body text-center">
        <div class="position-relative d-inline-block mb-3">
          <img [src]="profile_picture_url" alt="avatar" class="rounded-circle img-fluid shadow-sm"
            style="width: 120px; height: 120px; border: 3px solid #fff;">
        </div>
        <h5 class="mb-1 fw-bold">{{fullName}}</h5>
        <p class="text-muted small mb-0">{{email}}</p>
      </div>
    </div>
  </div>

  <ng-template #editProfile>
    <div class="col-lg-5">
      <div class="card shadow-lg">
        <div class="card-header bg-white border-0 pt-4 px-4">
          <h5 class="fw-bold mb-0">Update Profile</h5>
          <small class="text-muted">Changes will be reflected immediately.</small>
        </div>
        <div class="card-body p-4">
          <form (submit)="handleSubmit()">
            <div class="form-outline mb-3">
              <label class="form-label">First Name</label>
              <input type="text" name="firstName" class="form-control" [(ngModel)]="first_name" required />
            </div>

            <div class="form-outline mb-3">
              <label class="form-label">Last Name</label>
              <input type="text" name="lastName" class="form-control" [(ngModel)]="last_name" required />
            </div>

            <div class="form-outline mb-4">
              <label class="form-label" for="profilePicture">Profile picture</label>
              <input type="file" class="form-control" id="profilePicture" accept="image/png, image/jpeg" 
                (change) = "onFileSelected($event)"/>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-primary btn-lg btn-block shadow-sm" type="submit" [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isLoading ? 'Saving...' : 'Save Changes' }}
              </button>
              <button class="btn btn-light btn-lg btn-block text-danger" type="button" (click)="isEditing = false"
                [disabled]="isLoading">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </ng-template>

</div>
