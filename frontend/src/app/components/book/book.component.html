<div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3">
        <h5 class="mb-0 fw-bold"><i class="bi bi-book me-2"></i>{{ isEditing ? 'Update book' : 'Register new book' }}
        </h5>
    </div>

    <div class="card-body p-4">
        <form class="row g-3">
            <div class="col-md-8">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted">Title</label>
                        <input type="text" class="form-control form-control-sm" name="title" [(ngModel)]="newBook.title"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Author</label>
                        <input type="text" class="form-control form-control-sm" name="authors" [(ngModel)]="authors"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Categories</label>
                        <input type="text" class="form-control form-control-sm" name="categories"
                            [(ngModel)]="categories" required>
                    </div>

                    <!-- <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Categories</label>
                        <select class="form-select form-select-sm">
                            <option selected disabled>Select category</option>
                            <option>Fantasy</option>
                            <option>Science Fiction</option>
                            <option>Classic</option>
                            <option>Biography</option>
                        </select>
                    </div> -->

                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted">Summary / Description</label>
                        <textarea class="form-control form-control-sm" rows="3" name="description"
                            [(ngModel)]="newBook.description"></textarea>
                    </div>
                </div>
            </div>

            <div class="col-md-4 border-start ps-4">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted">ISBN</label>
                        <input type="text" class="form-control form-control-sm" name="isbn" [disabled]="isEditing"
                            [(ngModel)]="newBook.isbn" required>
                    </div>

                    <div class="col-12 text-center mb-2">
                        <label class="form-label small d-block fw-bold text-muted text-start">Cover Image</label>
                        <div class="border rounded-2 bg-light d-flex align-items-center justify-content-center"
                            style="height: 120px; cursor: pointer;">
                            @if (newBook.thumbnail) {
                            <img [src]="newBook.thumbnail" alt="Book cover" class="rounded-2"
                                style="height: 120px; width: 80px; object-fit: cover;" />
                            } @else {
                            <!-- <div class="text-center">
                                <i class="bi bi-cloud-arrow-up fs-2 text-muted"></i>
                                <span class="d-block small text-muted">Click to upload</span>
                            </div> -->
                            <div class="bg-secondary rounded-2" style="height: 120px; width: 80px; object-fit: cover;">
                            </div>
                            }
                        </div>
                    </div>

                    @if (!isEditing) {
                    <div class="col-12">
                        <label class="form-label small fw-bold text-muted">Stock Quantity</label>
                        <input type="number" class="form-control form-control-sm" name="quantity" min="1"
                            [(ngModel)]="quantity">
                    </div>
                    }
                </div>
            </div>

            <div class="col-12 border-top mt-4 pt-3 d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light btn-sm px-4 border" (click)="goBack()">Cancel</button>
                <button type="submit" class="btn btn-primary btn-sm px-4 shadow-sm" (click)="saveBook()">{{ isEditing ?
                    'Save Changes' : 'Save Book' }}</button>
            </div>
        </form>
    </div>
</div>
