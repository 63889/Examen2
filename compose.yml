services:
  backend:
    entrypoint: ["/bin/bash", "/backend/entrypoint.sh"]
    container_name: dumpbackend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - postgres_db
      - mongo_db
    volumes:
      - ./backend:/backend
      - ./nginx/images:/backend/media
  
  frontend:
    container_name: dumpfrontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ./frontend:/frontend
      
  postgres_db:
    container_name: dumppostgres
    image: postgres:17
    # Restart policy: keeps the DB running if it crashes or the PC restarts
    restart: always
    # Define environment variables for this container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Map the container's port 5432 to the host's port 5434
    ports: 
      - "5434:5432"
    # Mount a volume to persist database data
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo_db:
    container_name: dumpmongo
    image: mongo:latest
    restart: always
    environment: 
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports: 
      - "8081:8081"
    environment: 
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo_db:27017
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
  
  web:
    container_name: dumpnginx
    image: nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/images:/usr/share/nginx/html/images:ro
    ports:
      - "8080:80"

volumes:
  pgdata:
  mongodata:
